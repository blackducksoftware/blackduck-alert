import groovy.json.JsonOutput
import groovy.json.JsonSlurper

ext.moduleName = 'com.blackduck.integration.alert.ui'
def pnpmStoreDir = "${project.projectDir}/.pnpm-store"

task corepackEnable(type: Exec) {
    commandLine 'corepack', 'enable', 'pnpm'
}

task corepackPrepare(type: Exec, dependsOn: [corepackEnable]) {
    workingDir project.projectDir
    commandLine 'corepack', 'prepare', '--activate'
}

task cleanBundles(type: Delete) {
    doLast {
        File staticResourcesDirectory = new File('src/main/static')
        if (staticResourcesDirectory.exists()) {
            logger.lifecycle('Deleting ' + staticResourcesDirectory.canonicalPath)
            staticResourcesDirectory.deleteDir()
        }
    }
}

task updatePnpmVersion(type: Task) {
    def packageJsonFile = file('package.json')
    def rootBuildDotGradle = file('../build.gradle')

    inputs.file(packageJsonFile)
    inputs.file(rootBuildDotGradle)
    outputs.file(packageJsonFile)
    outputs.cacheIf { true }

    doLast {
        def packageSlurper = new JsonSlurper()
        def packageJson = packageSlurper.parse(packageJsonFile)
        if (packageJson.version != version) {
            packageJson.version = version

            final def updatedPackageJson = JsonOutput.toJson(packageJson)

            packageJsonFile.text = JsonOutput.prettyPrint(updatedPackageJson)
        }
    }
}

task pnpmInstallFromLockfile(type: Exec, dependsOn: [corepackPrepare]) {
    inputs.files('package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml')
    outputs.dir('node_modules')
    outputs.cacheIf { true }
    ignoreExitValue = true

    // --config.confirmModulesPurge=false tells PNPM to ignore the confirmation prompt needed when purging node_modules.
    // If PNPM determines that the lockfile is out of sync with package.json, it will automatically purge the node_modules.
    // Without this flag, the build would fail as there is no way to provide that necessary confirmation in an automated build process.
    commandLine 'pnpm', 'install', '--frozen-lockfile', '--store-dir', pnpmStoreDir, '--config.confirmModulesPurge=false'
}

task pnpmPruneStore(type: Exec, dependsOn: [pnpmInstallFromLockfile]) {
    // This task has no inputs or outputs, therefore we need to let Gradle know to run it with `upToDateWhen { false }`
    // We also need to only run this if the pnpm install failed, which we can determine by checking the execution
    // result of the pnpmInstallFromLockfile task.
    outputs.upToDateWhen { false }
    onlyIf {
        pnpmInstallFromLockfile.getExecutionResult().isPresent() &&
                pnpmInstallFromLockfile.getExecutionResult().get().getExitValue() != 0
    }

    commandLine 'pnpm', 'store', 'prune', '--store-dir', pnpmStoreDir
}

task pnpmInstallFromLockfileRetry(type: Exec, dependsOn: [pnpmPruneStore]) {
    inputs.file('package.json')
    inputs.file('pnpm-lock.yaml')
    outputs.dir('node_modules')
    outputs.cacheIf { true }
    onlyIf {
        pnpmInstallFromLockfile.getExecutionResult().isPresent() &&
                pnpmInstallFromLockfile.getExecutionResult().get().getExitValue() != 0
    }
    doFirst {
        logger.error('The initial pnpm install failed. Trying to run the pnpm install again.')
        logger.error('pnpm is required. See README.md')
    }

    commandLine 'pnpm', 'install', '--frozen-lockfile', '--store-dir', pnpmStoreDir, '--config.confirmModulesPurge=false'
}

task pnpmBuild(type: Exec, dependsOn: [pnpmInstallFromLockfileRetry]) {
    inputs.file('pnpm-lock.yaml')
    inputs.dir('src/main/js')
    inputs.dir('src/main/css')
    inputs.dir('src/main/img')
    outputs.dir("${project.buildDir}/resources/main/static")
    outputs.cacheIf { true }

    commandLine 'pnpm', 'run', 'build'
}

task copyStaticWebContent(type: Copy) {
    outputs.cacheIf { true }

    from("${project.projectDir}/src/main/css") {
        into 'css'
    }
    from("${project.projectDir}/src/main/img") {
        into 'img'
    }
    into "${project.buildDir}/resources/main/static"
}

tasks.copyStaticWebContent.finalizedBy(updatePnpmVersion)
tasks.copyStaticWebContent.finalizedBy(pnpmBuild)
tasks.pnpmBuild.mustRunAfter(updatePnpmVersion)
tasks.pnpmBuild.mustRunAfter(copyStaticWebContent)
tasks.clean.finalizedBy(cleanBundles)
